# Event Catalog v1
#
# All domain events emitted by the system.
# Rules:
# - Events are immutable once shipped. Add new version instead of changing existing.
# - Every event payload MUST include: eventId, occurredAt, version, data
# - Naming: entity.action, lowercase with dots as separators
# - Add entry here BEFORE implementing event emission in code

version: "1"

standardPayload:
  required: [eventId, occurredAt, version, data]
  properties:
    eventId: { type: string, format: uuid }
    occurredAt: { type: string, format: date-time }
    version: { type: integer }
    data: { type: object }

events:
  customer.created:
    description: Fired when a customer record is created.
    version: 1
    owner: customers-module
    data:
      required: [customerId, actorUserId, name, customerKind]
      properties:
        customerId: { type: string, format: uuid }
        actorUserId: { type: string, format: uuid }
        name: { type: string }
        customerKind: { type: string, enum: [company, person] }

  customer.updated:
    description: Fired when customer core fields change.
    version: 1
    owner: customers-module
    data:
      required: [customerId, actorUserId, changedFields]
      properties:
        customerId: { type: string, format: uuid }
        actorUserId: { type: string, format: uuid }
        changedFields:
          type: array
          items: { type: string }

  customer.status_changed:
    description: Fired when customer lifecycle status changes.
    version: 1
    owner: customers-module
    data:
      required: [customerId, actorUserId, fromStatus, toStatus]
      properties:
        customerId: { type: string, format: uuid }
        actorUserId: { type: string, format: uuid }
        fromStatus: { type: string }
        toStatus: { type: string }

  customer.archived:
    description: Fired when a customer is archived.
    version: 1
    owner: customers-module
    data:
      required: [customerId, actorUserId]
      properties:
        customerId: { type: string, format: uuid }
        actorUserId: { type: string, format: uuid }
        archiveReason: { type: string }

  customer.restored:
    description: Fired when an archived customer is restored.
    version: 1
    owner: customers-module
    data:
      required: [customerId, actorUserId]
      properties:
        customerId: { type: string, format: uuid }
        actorUserId: { type: string, format: uuid }

  customer.contact_created:
    description: Fired when a contact is created for a customer.
    version: 1
    owner: customers-module
    data:
      required: [customerId, contactId, actorUserId]
      properties:
        customerId: { type: string, format: uuid }
        contactId: { type: string, format: uuid }
        actorUserId: { type: string, format: uuid }

  customer.contact_updated:
