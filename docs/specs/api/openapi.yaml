openapi: 3.0.3
info:
  title: Stoneboyz CRM API
  version: 0.1.0
  description: |
    Source of truth for all API contracts.
    Edit this file before implementing any endpoint.
    packages/api-client is generated from this file; do not hand-edit it.

servers:
  - url: http://localhost:3001/api/v1
    description: Local development
  - url: https://api.stoneboyz.app/v1
    description: Production placeholder

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    CustomerId:
      name: customerId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string

    QuoteId:
      name: quoteId
      in: path
      required: true
      description: UUID of the quote
      schema:
        type: string
        format: uuid

    LineItemId:
      name: lineItemId
      in: path
      required: true
      description: UUID of the quote line item
      schema:
        type: string
        format: uuid

    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25

  schemas:
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: Request validation failed
        details:
          type: object

    CustomerKind:
      type: string
      enum: [company, person]

    CustomerStatus:
      type: string
      enum: [lead, qualified, active, inactive, churned]

    CustomerType:
      type: string
      enum: [prospect, customer, partner, vendor]

    CustomerSort:
      type: string
      enum: [name, createdAt, updatedAt, status]

    SortDirection:
      type: string
      enum: [asc, desc]

    ContactChannel:
      type: string
      enum: [email, phone, whatsapp, none]

    Customer:
      type: object
      required:
        - id
        - customerKind
        - name
        - status
        - type
        - ownerUserId
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        customerKind:
          $ref: '#/components/schemas/CustomerKind'
        name:
          type: string
        companyName:
          type: string
          nullable: true
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        displayName:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/CustomerStatus'
        type:
          $ref: '#/components/schemas/CustomerType'
        ownerUserId:
          type: string
          format: uuid
        primaryContactId:
          type: string
          format: uuid
          nullable: true
        billingContactId:
          type: string
          format: uuid
          nullable: true
        billingAddressId:
          type: string
          format: uuid
          nullable: true
        taxId:
          type: string
          nullable: true
        website:
          type: string
          format: uri
          nullable: true
        industry:
          type: string
          nullable: true
        companySize:
          type: string
          nullable: true
        source:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        notesSummary:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        whatsappPhone:
          type: string
          nullable: true
        billingEmail:
          type: string
          format: email
          nullable: true
        archiveReason:
          type: string
          nullable: true
        archivedAt:
          type: string
          format: date-time
          nullable: true
        archivedByUserId:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateCustomerRequest:
      type: object
      required: [customerKind, name, status, type, ownerUserId, actorUserId]
      properties:
        actorUserId:
          type: string
          format: uuid
        customerKind:
          $ref: '#/components/schemas/CustomerKind'
        name:
          type: string
          minLength: 1
        companyName:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        displayName:
          type: string
        status:
          $ref: '#/components/schemas/CustomerStatus'
        type:
          $ref: '#/components/schemas/CustomerType'
        ownerUserId:
          type: string
          format: uuid
        taxId:
          type: string
        website:
          type: string
          format: uri
        industry:
          type: string
        companySize:
          type: string
        source:
          type: string
        tags:
          type: array
          items:
            type: string
        notesSummary:
          type: string
        phone:
          type: string
        whatsappPhone:
          type: string
        billingEmail:
          type: string
          format: email

    UpdateCustomerRequest:
      type: object
      minProperties: 1
      required: [actorUserId]
      properties:
        actorUserId:
          type: string
          format: uuid
        customerKind:
          $ref: '#/components/schemas/CustomerKind'
        name:
          type: string
          minLength: 1
        companyName:
          type: string
          nullable: true
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        displayName:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/CustomerStatus'
        type:
          $ref: '#/components/schemas/CustomerType'
        ownerUserId:
          type: string
          format: uuid
        taxId:
          type: string
          nullable: true
        website:
          type: string
          format: uri
          nullable: true
        industry:
          type: string
          nullable: true
        companySize:
          type: string
          nullable: true
        source:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        notesSummary:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        whatsappPhone:
          type: string
          nullable: true
        billingEmail:
          type: string
          format: email
          nullable: true

    ArchiveCustomerRequest:
      type: object
      required: [actorUserId]
      properties:
        actorUserId:
          type: string
          format: uuid
        archiveReason:
          type: string

    RestoreCustomerRequest:
      type: object
      required: [actorUserId]
      properties:
        actorUserId:
          type: string
          format: uuid

    ProjectStatus:
      type: string
      enum: [draft, active, completed]

    ProjectSort:
      type: string
      enum: [title, createdAt, updatedAt, status]

    Project:
      type: object
      required:
        - id
        - customerId
        - title
        - status
        - ownerUserId
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/ProjectStatus'
        ownerUserId:
          type: string
        archivedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateProjectRequest:
      type: object
      required: [actorUserId, customerId, title, ownerUserId]
      properties:
        actorUserId:
          type: string
        customerId:
          type: string
          format: uuid
        title:
          type: string
          minLength: 1
        description:
          type: string
        status:
          $ref: '#/components/schemas/ProjectStatus'
        ownerUserId:
          type: string

    UpdateProjectRequest:
      type: object
      minProperties: 1
      required: [actorUserId]
      properties:
        actorUserId:
          type: string
        customerId:
          type: string
          format: uuid
        title:
          type: string
          minLength: 1
        description:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/ProjectStatus'
        ownerUserId:
          type: string

    ArchiveProjectRequest:
      type: object
      required: [actorUserId]
      properties:
        actorUserId:
          type: string

    CustomerContact:
      type: object
      required:
        - id
        - customerId
        - firstName
        - isPrimary
        - isBilling
        - preferredChannel
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
          nullable: true
        jobTitle:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        phone:
          type: string
          nullable: true
        whatsappPhone:
          type: string
          nullable: true
        isPrimary:
          type: boolean
        isBilling:
          type: boolean
        preferredChannel:
          $ref: '#/components/schemas/ContactChannel'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        archivedAt:
          type: string
          format: date-time
          nullable: true

    CreateCustomerContactRequest:
      type: object
      required: [firstName, actorUserId]
      properties:
        actorUserId:
          type: string
          format: uuid
        firstName:
          type: string
          minLength: 1
        lastName:
          type: string
        jobTitle:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        whatsappPhone:
          type: string
        isPrimary:
          type: boolean
          default: false
        isBilling:
          type: boolean
          default: false
        preferredChannel:
          $ref: '#/components/schemas/ContactChannel'

    UpdateCustomerContactRequest:
      type: object
      minProperties: 1
      required: [actorUserId]
      properties:
        actorUserId:
          type: string
          format: uuid
        firstName:
          type: string
          minLength: 1
        lastName:
          type: string
          nullable: true
        jobTitle:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        phone:
          type: string
          nullable: true
        whatsappPhone:
          type: string
          nullable: true
        isPrimary:
          type: boolean
        isBilling:
          type: boolean
        preferredChannel:
          $ref: '#/components/schemas/ContactChannel'

    CustomerAddressType:
      type: string
      enum: [billing, shipping, office, other]

    CustomerAddress:
      type: object
      required:
        - id
        - customerId
        - type
        - line1
        - city
        - country
        - isPrimary
        - isBilling
        - createdAt
        - updatedAt
        - archivedAt
      properties:
        id:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/CustomerAddressType'
        line1:
          type: string
        line2:
          type: string
          nullable: true
        city:
          type: string
        region:
          type: string
          nullable: true
        postalCode:
          type: string
          nullable: true
        country:
          type: string
        isPrimary:
          type: boolean
        isBilling:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        archivedAt:
          type: string
          format: date-time
          nullable: true

    CreateCustomerAddressRequest:
      type: object
      required: [actorUserId, type, line1, city, country]
      properties:
        actorUserId:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/CustomerAddressType'
        line1:
          type: string
        line2:
          type: string
        city:
          type: string
        region:
          type: string
        postalCode:
          type: string
        country:
          type: string
        isPrimary:
          type: boolean
          default: false
        isBilling:
          type: boolean
          default: false

    UpdateCustomerAddressRequest:
      type: object
      description: At least one updatable address field is required.
      minProperties: 2
      required: [actorUserId]
      properties:
        actorUserId:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/CustomerAddressType'
        line1:
          type: string
        line2:
          type: string
          nullable: true
        city:
          type: string
        region:
          type: string
          nullable: true
        postalCode:
          type: string
          nullable: true
        country:
          type: string
        isPrimary:
          type: boolean
        isBilling:
          type: boolean

    CustomerNote:
      type: object
      required: [id, customerId, authorUserId, body, createdAt, updatedAt, archivedAt]
      properties:
        id:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
        authorUserId:
          type: string
          format: uuid
        body:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        archivedAt:
          type: string
          format: date-time
          nullable: true

    CreateCustomerNoteRequest:
      type: object
      required: [actorUserId, body]
      properties:
        actorUserId:
          type: string
          format: uuid
        body:
          type: string
          minLength: 1

    UpdateCustomerNoteRequest:
      type: object
      required: [actorUserId, body]
      properties:
        actorUserId:
          type: string
          format: uuid
        body:
          type: string
          minLength: 1

    ActorRequest:
      type: object
      required: [actorUserId]
      properties:
        actorUserId:
          type: string
          format: uuid

    PaginatedCustomersResponse:
      type: object
      required: [data, hasMore]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Customer'
        nextCursor:
          type: string
          nullable: true
        hasMore:
          type: boolean

    PaginatedProjectsResponse:
      type: object
      required: [data, hasMore]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Project'
        nextCursor:
          type: string
          nullable: true
        hasMore:
          type: boolean

    QuoteStatus:
      type: string
      enum: [draft, sent, accepted, rejected]

    QuoteLineItem:
      type: object
      required:
        - id
        - quoteId
        - sortOrder
        - stoneType
        - qty
        - qtyUnit
        - unitPriceCents
        - laborPriceCents
        - lineTotalCents
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        quoteId:
          type: string
          format: uuid
        sortOrder:
          type: integer
          default: 0
        stoneType:
          type: string
          example: Marble Calacatta
        lengthMm:
          type: integer
          nullable: true
        widthMm:
          type: integer
          nullable: true
        thicknessMm:
          type: integer
          nullable: true
          example: 20
        edgeProfile:
          type: string
          nullable: true
          example: bullnose
        qty:
          type: number
          format: decimal
        qtyUnit:
          type: string
          example: sqm
        unitPriceCents:
          type: integer
          minimum: 0
        laborPriceCents:
          type: integer
          minimum: 0
          default: 0
        lineTotalCents:
          type: integer
          description: Computed by application — floor(qty * (unitPriceCents + laborPriceCents)). Not stored in DB.
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Quote:
      type: object
      required:
        - id
        - customerId
        - quoteNumber
        - title
        - status
        - discountCents
        - taxRateBps
        - subtotalCents
        - totalCents
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
          nullable: true
        quoteNumber:
          type: string
          example: Q-2026-001
        title:
          type: string
        status:
          $ref: '#/components/schemas/QuoteStatus'
        validUntil:
          type: string
          format: date
          nullable: true
        subtotalCents:
          type: integer
          description: Computed by application — sum of all lineTotalCents. Not stored in DB.
        discountCents:
          type: integer
          minimum: 0
          default: 0
        taxRateBps:
          type: integer
          minimum: 0
          default: 0
          description: Tax rate in basis points (e.g. 1500 = 15%)
        totalCents:
          type: integer
          description: Computed by application — floor((subtotalCents - discountCents) * (1 + taxRateBps / 10000)). Not stored in DB.
        notes:
          type: string
          nullable: true
        termsAndConditions:
          type: string
          nullable: true
        sentAt:
          type: string
          format: date-time
          nullable: true
        acceptedAt:
          type: string
          format: date-time
          nullable: true
        rejectedAt:
          type: string
          format: date-time
          nullable: true
        archivedAt:
          type: string
          format: date-time
          nullable: true
        archivedByUserId:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    QuoteWithLineItems:
      allOf:
        - $ref: '#/components/schemas/Quote'
        - type: object
          required: [lineItems]
          properties:
            lineItems:
              type: array
              items:
                $ref: '#/components/schemas/QuoteLineItem'

    CreateQuoteLineItemRequest:
      type: object
      required: [actorUserId, stoneType, qty, qtyUnit, unitPriceCents]
      properties:
        actorUserId:
          type: string
          format: uuid
        sortOrder:
          type: integer
          default: 0
        stoneType:
          type: string
          minLength: 1
        lengthMm:
          type: integer
        widthMm:
          type: integer
        thicknessMm:
          type: integer
        edgeProfile:
          type: string
        qty:
          type: number
          format: decimal
          exclusiveMinimum: 0
        qtyUnit:
          type: string
          minLength: 1
        unitPriceCents:
          type: integer
          minimum: 0
        laborPriceCents:
          type: integer
          minimum: 0
          default: 0
        notes:
          type: string

    UpdateQuoteLineItemRequest:
      type: object
      description: At least one updatable field is required in addition to actorUserId.
      minProperties: 2
      required: [actorUserId]
      properties:
        actorUserId:
          type: string
          format: uuid
        sortOrder:
          type: integer
        stoneType:
          type: string
          minLength: 1
        lengthMm:
          type: integer
          nullable: true
        widthMm:
          type: integer
          nullable: true
        thicknessMm:
          type: integer
          nullable: true
        edgeProfile:
          type: string
          nullable: true
        qty:
          type: number
          format: decimal
          exclusiveMinimum: 0
        qtyUnit:
          type: string
          minLength: 1
        unitPriceCents:
          type: integer
          minimum: 0
        laborPriceCents:
          type: integer
          minimum: 0
        notes:
          type: string
          nullable: true

    CreateQuoteRequest:
      type: object
      required: [actorUserId, title]
      properties:
        actorUserId:
          type: string
          format: uuid
        title:
          type: string
          minLength: 1
        projectId:
          type: string
          format: uuid
        validUntil:
          type: string
          format: date
        discountCents:
          type: integer
          minimum: 0
          default: 0
        taxRateBps:
          type: integer
          minimum: 0
          default: 0
        notes:
          type: string
        termsAndConditions:
          type: string
        lineItems:
          type: array
          description: Optional initial line items to create with the quote.
          items:
            $ref: '#/components/schemas/CreateQuoteLineItemRequest'

    UpdateQuoteRequest:
      type: object
      description: At least one updatable field is required in addition to actorUserId. Only allowed when quote is in draft status.
      minProperties: 2
      required: [actorUserId]
      properties:
        actorUserId:
          type: string
          format: uuid
        title:
          type: string
          minLength: 1
        projectId:
          type: string
          format: uuid
          nullable: true
        validUntil:
          type: string
          format: date
          nullable: true
        discountCents:
          type: integer
          minimum: 0
        taxRateBps:
          type: integer
          minimum: 0
        notes:
          type: string
          nullable: true
        termsAndConditions:
          type: string
          nullable: true

    PaginatedQuotesResponse:
      type: object
      required: [data, hasMore]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Quote'
        nextCursor:
          type: string
          nullable: true
        hasMore:
          type: boolean

security:
  - bearerAuth: []

paths:
  /health:
    get:
      operationId: healthCheck
      summary: Health check
      security: []
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status, timestamp]
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time

  /projects:
    get:
      operationId: listProjects
      summary: List projects
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/ProjectStatus'
        - name: customerId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: ownerUserId
          in: query
          required: false
          schema:
            type: string
        - name: sortBy
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/ProjectSort'
        - name: sortDirection
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/SortDirection'
        - name: includeArchived
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Projects returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedProjectsResponse'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      operationId: createProject
      summary: Create project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Customer not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /projects/archived:
    get:
      operationId: listArchivedProjects
      summary: List archived projects
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: customerId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/ProjectStatus'
      responses:
        '200':
          description: Archived projects returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedProjectsResponse'

  /projects/{projectId}:
    get:
      operationId: getProject
      summary: Get project detail
      parameters:
