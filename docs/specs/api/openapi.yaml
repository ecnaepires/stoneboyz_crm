          in: query
          required: false
          schema:
            $ref: '#/components/schemas/ScheduledEventStatus'
        - name: projectId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: from
          in: query
          required: false
          description: Filter events with scheduledAt on or after this date (ISO date).
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: false
          description: Filter events with scheduledAt on or before this date (ISO date).
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Events returned. Default sort is scheduledAt ASC.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedScheduledEventsResponse'
        '404':
          description: Customer not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      operationId: createCustomerEvent
      summary: Create a scheduled event for a customer
      parameters:
        - $ref: '#/components/parameters/CustomerId'
      requestBody:
        required: true
        content:
          application/json:
