          $ref: '#/components/schemas/SlabQualityGrade'
        lengthIn:
          type: number
          minimum: 1
        widthIn:
          type: number
          minimum: 1
        thicknessCm:
          type: number
          minimum: 1
        lotNumber:
          type: string
          nullable: true
        bundleNumber:
          type: string
          nullable: true
        warehouseLocation:
          type: string
          nullable: true
        costCents:
          type: integer
          minimum: 0
        imageUrls:
          type: array
          maxItems: 20
          items:
            type: string
            format: uri
        notes:
          type: string
          nullable: true

    CutSlabRequest:
      type: object
      properties:
        remnants:
          type: array
          items:
            $ref: '#/components/schemas/CreateSlabRequest'

    CutSlabResponse:
      type: object
      required: [slab, remnants]
      properties:
        slab:
          $ref: '#/components/schemas/Slab'
        remnants:
          type: array
          items:
            $ref: '#/components/schemas/Slab'

    ProjectSlab:
      type: object
      required: [id, projectId, slabId, createdAt]
      properties:
        id:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        slabId:
          type: string
          format: uuid
        consumedByUserId:
          type: string
          format: uuid
          nullable: true
        consumedAt:
          type: string
          format: date-time
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    AttachProjectSlabRequest:
      type: object
      required: [slabId]
      properties:
        slabId:
          type: string
          format: uuid
        notes:
          type: string

    PaginatedSlabsResponse:
      type: object
      required: [data, hasMore]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Slab'
        nextCursor:
          type: string
          nullable: true
        hasMore:
          type: boolean

    OrderPaymentMethod:
      type: string
      enum: [cash, check, mastercard, visa, american_express, discover, bank_transfer, echeck]

    OrderPaymentStatus:
      type: string
      enum: [unpaid, partially_paid, paid]

    OrderPayment:
      type: object
      required:
        - id
        - orderId
        - paymentDate
        - amountCents
        - paymentMethod
        - referenceNumber
        - notes
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        orderId:
          type: string
          format: uuid
        paymentDate:
          type: string
          format: date
        amountCents:
          type: integer
        paymentMethod:
          $ref: '#/components/schemas/OrderPaymentMethod'
        referenceNumber:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Order:
      type: object
      required:
        - id
        - quoteId
        - customerId
        - orderNumber
        - title
        - saleDate
        - subtotalCents
        - discountCents
        - taxRateBps
        - totalCents
        - totalPaidCents
        - balanceDueCents
        - paymentStatus
        - notes
        - termsAndConditions
        - archivedAt
        - archivedByUserId
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        quoteId:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
        orderNumber:
          type: string
        title:
          type: string
        saleDate:
          type: string
          format: date
        subtotalCents:
          type: integer
        discountCents:
          type: integer
        taxRateBps:
          type: integer
        totalCents:
          type: integer
        totalPaidCents:
          type: integer
        balanceDueCents:
          type: integer
        paymentStatus:
          $ref: '#/components/schemas/OrderPaymentStatus'
        notes:
          type: string
          nullable: true
        termsAndConditions:
          type: string
          nullable: true
        archivedAt:
          type: string
          format: date-time
          nullable: true
        archivedByUserId:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        areas:
          type: array
          items:
            $ref: '#/components/schemas/OrderArea'
        lineItems:
          type: array
          items:
            $ref: '#/components/schemas/OrderLineItem'

    OrderArea:
      type: object
      required:
        - id
        - orderId
        - sortOrder
        - name
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        orderId:
          type: string
          format: uuid
        sortOrder:
          type: integer
        name:
          type: string
        material:
          type: string
          nullable: true
        color:
          type: string
          nullable: true
        edgeProfile:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    OrderLineItem:
      type: object
      required:
        - id
        - orderId
        - sortOrder
        - stoneType
        - qty
        - qtyUnit
        - unitPriceCents
        - laborPriceCents
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        orderId:
          type: string
          format: uuid
        quoteAreaId:
          type: string
          format: uuid
          nullable: true
        slabId:
          type: string
          format: uuid
          nullable: true
        sortOrder:
          type: integer
        stoneType:
          type: string
        lengthIn:
          type: number
          nullable: true
        widthIn:
          type: number
          nullable: true
        thicknessCm:
          type: number
          nullable: true
        edgeProfile:
          type: string
          nullable: true
        qty:
          type: number
        qtyUnit:
          type: string
        unitPriceCents:
          type: integer
        laborPriceCents:
          type: integer
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    OrderWithPayments:
      allOf:
        - $ref: '#/components/schemas/Order'
        - type: object
          required: [payments]
          properties:
            payments:
              type: array
              items:
                $ref: '#/components/schemas/OrderPayment'

    PaginatedOrdersResponse:
      type: object
      required: [data, hasMore]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Order'
        nextCursor:
          type: string
          nullable: true
        hasMore:
          type: boolean

    ConvertQuoteToOrderRequest:
      type: object
      required: [saleDate]
      properties:
        saleDate:
          type: string
          format: date

    AddOrderPaymentRequest:
      type: object
      required: [paymentDate, amountCents, paymentMethod]
      properties:
        paymentDate:
          type: string
          format: date
        amountCents:
          type: integer
          minimum: 1
        paymentMethod:
          $ref: '#/components/schemas/OrderPaymentMethod'
        referenceNumber:
          type: string
        notes:
          type: string

    RemoveOrderPaymentRequest:
      type: object
      properties:

    ArchiveOrderRequest:
      type: object
      properties:

security:
  - bearerAuth: []

paths:
  /dashboard:
    get:
      operationId: getDashboard
      summary: Get dashboard summary statistics and recent quotes
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Dashboard stats returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardStats'

  /inventory/slabs:
    get:
      operationId: listSlabs
      summary: List global inventory slabs
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/SlabStatus'
        - name: stoneType
          in: query
          schema:
            type: string
        - name: finish
          in: query
          schema:
            $ref: '#/components/schemas/SlabFinish'
      responses:
        '200':
          description: Slabs returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedSlabsResponse'
    post:
      operationId: createSlab
      summary: Create a global inventory slab
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSlabRequest'
      responses:
        '201':
          description: Slab created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Slab'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /price-lists:
    get:
      operationId: listPriceLists
      summary: List price lists
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - name: limit
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/PriceListStatus'
        - name: search
          in: query
          schema:
            type: string
        - name: includeArchived
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Price lists returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceListListResponse'
    post:
      operationId: createPriceList
      summary: Create a price list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePriceListRequest'
      responses:
        '201':
          description: Price list created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceList'

  /price-lists/{priceListId}:
    get:
      operationId: getPriceList
      summary: Get a price list
      parameters:
        - $ref: '#/components/parameters/PriceListId'
      responses:
        '200':
          description: Price list returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceListWithItems'
    patch:
      operationId: updatePriceList
      summary: Update a draft price list
      parameters:
        - $ref: '#/components/parameters/PriceListId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePriceListRequest'
      responses:
        '200':
          description: Price list updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceList'

  /price-lists/{priceListId}/activate:
    post:
      operationId: activatePriceList
      summary: Activate a draft price list
      parameters:
        - $ref: '#/components/parameters/PriceListId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActorRequest'
      responses:
        '201':
          description: Price list activated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceList'

  /price-lists/{priceListId}/archive:
    post:
      operationId: archivePriceList
      summary: Archive a draft price list
      parameters:
        - $ref: '#/components/parameters/PriceListId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActorRequest'
      responses:
        '201':
          description: Price list archived.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceList'

  /price-lists/{priceListId}/items:
    get:
      operationId: listPriceListItems
      summary: List price list items
      parameters:
        - $ref: '#/components/parameters/PriceListId'
      responses:
        '200':
          description: Items returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceListItemsResponse'
    post:
      operationId: createPriceListItem
      summary: Create a price list item
      parameters:
        - $ref: '#/components/parameters/PriceListId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePriceListItemRequest'
      responses:
        '201':
          description: Item created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceListItem'

  /price-lists/{priceListId}/items/{itemId}:
    patch:
      operationId: updatePriceListItem
      summary: Update a price list item
      parameters:
        - $ref: '#/components/parameters/PriceListId'
        - $ref: '#/components/parameters/PriceListItemId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePriceListItemRequest'
      responses:
        '200':
          description: Item updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceListItem'
    delete:
      operationId: deletePriceListItem
      summary: Hard-delete a price list item
      parameters:
        - $ref: '#/components/parameters/PriceListId'
        - $ref: '#/components/parameters/PriceListItemId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActorRequest'
      responses:
        '200':
          description: Item deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceListItem'

  /customers/{customerId}/orders:
    get:
      operationId: listCustomerOrders
      summary: List customer orders
      parameters:
        - $ref: '#/components/parameters/CustomerId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: paymentStatus
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/OrderPaymentStatus'
        - name: includeArchived
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Orders returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOrdersResponse'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/me:
    get:
      operationId: getMe
      summary: Get the current user profile
      responses:
        '200':
          description: Current user returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'

  /users:
    get:
      operationId: listUsers
      summary: List users
      responses:
        '200':
          description: Users returned.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserProfile'

  /users/{userId}/role:
    patch:
      operationId: updateUserRole
      summary: Update a user's role
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [admin, salesperson, templater, cutter, fabricator, installer, service_tech]
      responses:
        '200':
          description: User role updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '404':
          description: Customer not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /customers/{customerId}/orders/{orderId}:
    get:
      operationId: getCustomerOrder
      summary: Get a customer order
      parameters:
        - $ref: '#/components/parameters/CustomerId'
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Order returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderWithPayments'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Order or customer not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /customers/{customerId}/orders/{orderId}/payments:
    post:
      operationId: addOrderPayment
      summary: Add a payment to an order
      parameters:
        - $ref: '#/components/parameters/CustomerId'
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddOrderPaymentRequest'
      responses:
        '201':
          description: Payment added.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderPayment'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Order or customer not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /customers/{customerId}/orders/{orderId}/payments/{paymentId}:
    delete:
      operationId: removeOrderPayment
      summary: Remove a payment from an order
      parameters:
        - $ref: '#/components/parameters/CustomerId'
        - $ref: '#/components/parameters/OrderId'
        - $ref: '#/components/parameters/PaymentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemoveOrderPaymentRequest'
      responses:
        '200':
          description: Payment removed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderPayment'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Order, customer, or payment not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /customers/{customerId}/orders/{orderId}/archive:
    post:
      operationId: archiveOrder
      summary: Archive an order
      parameters:
        - $ref: '#/components/parameters/CustomerId'
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArchiveOrderRequest'
      responses:
        '200':
          description: Order archived.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Order or customer not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /inventory/slabs/{slabId}:
    get:
      operationId: getSlab
      summary: Get slab detail
      parameters:
        - $ref: '#/components/parameters/SlabId'
      responses:
        '200':
          description: Slab returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Slab'
        '404':
          description: Slab not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      operationId: updateSlab
      summary: Update slab fields
      parameters:
        - $ref: '#/components/parameters/SlabId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSlabRequest'
      responses:
        '200':
          description: Slab updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Slab'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Slab not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Slab status does not allow update.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: archiveSlab
      summary: Archive slab
      parameters:
        - $ref: '#/components/parameters/SlabId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActorRequest'
      responses:
        '200':
          description: Slab archived.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Slab'

  /inventory/slabs/{slabId}/cut:
    post:
      operationId: cutSlab
      summary: Mark slab cut and optionally create remnants
      parameters:
        - $ref: '#/components/parameters/SlabId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CutSlabRequest'
      responses:
        '200':
          description: Slab cut.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CutSlabResponse'

  /customers/{customerId}/projects/{projectId}/slabs:
    get:
      operationId: listProjectSlabs
      summary: List slabs attached to a project
      parameters:
        - $ref: '#/components/parameters/CustomerId'
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Project slabs returned.
          content:
            application/json:
              schema:
                type: object
                required: [data, projectSlabs]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Slab'
                  projectSlabs:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProjectSlab'
    post:
      operationId: attachProjectSlab
      summary: Attach a slab to a project
      parameters:
        - $ref: '#/components/parameters/CustomerId'
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttachProjectSlabRequest'
      responses:
        '201':
          description: Slab attached to project.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectSlab'

  /customers/{customerId}/projects/{projectId}/slabs/{slabId}:
    delete:
      operationId: detachProjectSlab
      summary: Detach a slab from a project
      parameters:
        - $ref: '#/components/parameters/CustomerId'
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/SlabId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActorRequest'
      responses:
        '200':
          description: Slab detached from project.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectSlab'

  /customers/{customerId}/projects/{projectId}/slabs/{slabId}/cut:
    post:
      operationId: cutProjectSlab
      summary: Cut a slab from project context
      parameters:
        - $ref: '#/components/parameters/CustomerId'
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/SlabId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CutSlabRequest'
      responses:
        '200':
          description: Project slab cut.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CutSlabResponse'

  /health:
    get:
      operationId: healthCheck
      summary: Health check
      security: []
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status, timestamp]
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time

  /projects:
    get:
      operationId: listProjects
      summary: List projects
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/ProjectStatus'
        - name: customerId
          in: query
          required: false
          schema:
