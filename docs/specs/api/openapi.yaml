openapi: 3.0.3
info:
  title: Stoneboyz CRM API
  version: 0.1.0
  description: |
    Source of truth for all API contracts.
    Edit this file before implementing any endpoint.
    packages/api-client is generated from this file; do not hand-edit it.

servers:
  - url: http://localhost:3001/api/v1
    description: Local development
  - url: https://api.stoneboyz.app/v1
    description: Production placeholder

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    cookieAuth:
      type: apiKey
      in: cookie
      name: better-auth.session_token

  parameters:
    CustomerId:
      name: customerId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string

    QuoteId:
      name: quoteId
      in: path
      required: true
      description: UUID of the quote
      schema:
        type: string
        format: uuid

    LineItemId:
      name: lineItemId
      in: path
      required: true
      description: UUID of the quote line item
      schema:
        type: string
        format: uuid

    AreaId:
      name: areaId
      in: path
      required: true
      description: UUID of the quote area
      schema:
        type: string
        format: uuid

    PieceId:
      name: id
      in: path
      required: true
      description: UUID of the counter piece
      schema:
        type: string
        format: uuid

    EdgeId:
      name: id
      in: path
      required: true
      description: UUID of the edge segment
      schema:
        type: string
        format: uuid

    SinkId:
      name: id
      in: path
      required: true
      description: UUID of the sink cutout
      schema:
        type: string
        format: uuid

    EventId:
      name: eventId
      in: path
      required: true
      description: UUID of the scheduled event
      schema:
        type: string
        format: uuid

    PriceListId:
      name: priceListId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    PriceListItemId:
      name: itemId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    OrderId:
      name: orderId
      in: path
      required: true
      description: UUID of the order
      schema:
        type: string
        format: uuid

    PaymentId:
      name: paymentId
      in: path
      required: true
      description: UUID of the order payment
      schema:
        type: string
        format: uuid

    SlabId:
      name: slabId
      in: path
      required: true
      description: UUID of the slab
      schema:
        type: string
        format: uuid

    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25

  schemas:
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: Request validation failed
        details:
          type: object

    RecentQuote:
      type: object
      required: [id, quoteNumber, title, status, customerId, customerName, createdAt]
      properties:
        id:
          type: string
          format: uuid
        quoteNumber:
          type: string
        title:
          type: string
        status:
          type: string
        customerId:
          type: string
          format: uuid
        customerName:
          type: string
        createdAt:
          type: string
          format: date-time

    DashboardStats:
      type: object
      required: [activeCustomers, openQuotes, ordersThisMonth, eventsThisWeek, recentQuotes]
      properties:
        activeCustomers:
          type: integer
        openQuotes:
          type: object
          required: [count, totalCents]
          properties:
            count:
              type: integer
            totalCents:
              type: integer
        ordersThisMonth:
          type: object
          required: [count, totalCents]
          properties:
            count:
              type: integer
            totalCents:
              type: integer
        eventsThisWeek:
          type: integer
        recentQuotes:
          type: array
          items:
            $ref: '#/components/schemas/RecentQuote'

    UserProfile:
      type: object
      required: [id, email, name, role, createdAt]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [admin, salesperson, templater, cutter, fabricator, installer, service_tech]
        createdAt:
          type: string
          format: date-time

    PortalQuote:
      type: object
      required: [id, quoteNumber, title, status, customerId, customerName, discountCents, taxCents, subtotalCents, taxRateBps, shareToken, pipelineStage, pipelineStatus, nextActivityDate, phaseName, areas, lineItems]
      properties:
        id:
          type: string
          format: uuid
        quoteNumber:
          type: string
        title:
          type: string
        status:
          type: string
        customerId:
          type: string
          format: uuid
        customerName:
          type: string
        validUntil:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        termsAndConditions:
          type: string
          nullable: true
        discountCents:
          type: integer
        taxCents:
          type: integer
        subtotalCents:
          type: integer
        taxRateBps:
          type: integer
        shareToken:
          type: string
          format: uuid
        pipelineStage:
          type: string
          nullable: true
        pipelineStatus:
          type: string
          nullable: true
        nextActivityDate:
          type: string
          nullable: true
        phaseName:
          type: string
          nullable: true
        areas:
          type: array
          items:
            type: object
            required: [id, name, sortOrder]
            properties:
              id:
                type: string
                format: uuid
              name:
                type: string
              sortOrder:
                type: integer
        lineItems:
          type: array
          items:
            type: object
            required: [id, stoneType, qty, qtyUnit, unitPriceCents, laborPriceCents, sortOrder]
            properties:
              id:
                type: string
                format: uuid
              stoneType:
                type: string
              qty:
                type: number
              qtyUnit:
                type: string
              unitPriceCents:
                type: integer
              laborPriceCents:
                type: integer
              lengthIn:
                type: number
                nullable: true
              widthIn:
                type: number
                nullable: true
              thicknessCm:
                type: number
                nullable: true
              edgeProfile:
                type: string
                nullable: true
              notes:
                type: string
                nullable: true
              sortOrder:
                type: integer
              quoteAreaId:
                type: string
                format: uuid
                nullable: true

    PriceListStatus:
      type: string
      enum: [draft, active, archived]

    PriceList:
      type: object
      required:
        - id
        - name
        - status
        - revision
        - currencyCode
        - defaultTaxRateBps
        - createdByUserId
        - archivedAt
        - archivedByUserId
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/PriceListStatus'
        revision:
          type: integer
        currencyCode:
          type: string
        defaultTaxRateBps:
          type: integer
        defaultPaymentTerms:
          type: string
          nullable: true
        expirationDays:
          type: integer
          nullable: true
        createdByUserId:
          type: string
          format: uuid
        archivedAt:
          type: string
          format: date-time
          nullable: true
        archivedByUserId:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PriceListItem:
      type: object
      required:
        - id
        - priceListId
        - category
        - itemType
        - name
        - unit
        - priceCents
        - sortOrder
        - taxable
        - allowDiscount
        - editableOnQuote
        - hideOnQuote
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        priceListId:
          type: string
          format: uuid
        category:
          type: string
        itemType:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        unit:
          type: string
        priceCents:
          type: integer
        sortOrder:
          type: integer
        taxable:
          type: boolean
        allowDiscount:
          type: boolean
        editableOnQuote:
          type: boolean
        hideOnQuote:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PriceListWithItems:
      allOf:
        - $ref: '#/components/schemas/PriceList'
        - type: object
          required: [items]
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/PriceListItem'

    PriceListListResponse:
      type: object
      required: [data, hasMore, nextCursor]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PriceList'
        hasMore:
          type: boolean
        nextCursor:
          type: string
          nullable: true

    PriceListItemsResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PriceListItem'

    CreatePriceListRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        revision:
          type: integer
        currencyCode:
          type: string
        defaultTaxRateBps:
          type: integer
        defaultPaymentTerms:
          type: string
        expirationDays:
          type: integer

    UpdatePriceListRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        revision:
          type: integer
        currencyCode:
          type: string
        defaultTaxRateBps:
          type: integer
        defaultPaymentTerms:
          type: string
          nullable: true
        expirationDays:
          type: integer
          nullable: true

    CreatePriceListItemRequest:
      type: object
      required: [category, itemType, name, unit, priceCents]
      properties:
        category:
          type: string
        itemType:
          type: string
        name:
          type: string
        description:
          type: string
        unit:
          type: string
        priceCents:
          type: integer
        sortOrder:
          type: integer
        taxable:
          type: boolean
        allowDiscount:
          type: boolean
        editableOnQuote:
          type: boolean
        hideOnQuote:
          type: boolean

    UpdatePriceListItemRequest:
      type: object
      properties:
        category:
          type: string
        itemType:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        unit:
          type: string
        priceCents:
          type: integer
        sortOrder:
          type: integer
        taxable:
          type: boolean
        allowDiscount:
          type: boolean
        editableOnQuote:
          type: boolean
        hideOnQuote:
          type: boolean

    CustomerKind:
      type: string
      enum: [company, person]

    CustomerStatus:
      type: string
      enum: [lead, qualified, active, inactive, churned]

    CustomerType:
      type: string
      enum: [prospect, customer, partner, vendor]

    CustomerSort:
      type: string
      enum: [name, createdAt, updatedAt, status]

    SortDirection:
      type: string
      enum: [asc, desc]

    ContactChannel:
      type: string
      enum: [email, phone, whatsapp, none]

    Customer:
      type: object
      required:
        - id
        - customerKind
        - name
        - status
        - type
        - ownerUserId
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        customerKind:
          $ref: '#/components/schemas/CustomerKind'
        name:
          type: string
        companyName:
          type: string
          nullable: true
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        displayName:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/CustomerStatus'
        type:
          $ref: '#/components/schemas/CustomerType'
        ownerUserId:
          type: string
          format: uuid
        primaryContactId:
          type: string
          format: uuid
          nullable: true
        billingContactId:
          type: string
          format: uuid
          nullable: true
        billingAddressId:
          type: string
          format: uuid
          nullable: true
        taxId:
          type: string
          nullable: true
        website:
          type: string
          format: uri
          nullable: true
        industry:
          type: string
          nullable: true
        companySize:
          type: string
          nullable: true
        source:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        notesSummary:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        whatsappPhone:
          type: string
          nullable: true
        billingEmail:
          type: string
          format: email
          nullable: true
        archiveReason:
          type: string
          nullable: true
        archivedAt:
          type: string
          format: date-time
          nullable: true
        archivedByUserId:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateCustomerRequest:
      type: object
      required: [customerKind, name, status, type, ownerUserId]
      properties:
        customerKind:
          $ref: '#/components/schemas/CustomerKind'
        name:
          type: string
          minLength: 1
        companyName:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        displayName:
          type: string
        status:
          $ref: '#/components/schemas/CustomerStatus'
        type:
          $ref: '#/components/schemas/CustomerType'
        ownerUserId:
          type: string
          format: uuid
        taxId:
          type: string
        website:
          type: string
          format: uri
        industry:
          type: string
        companySize:
          type: string
        source:
          type: string
        tags:
          type: array
          items:
            type: string
        notesSummary:
          type: string
        phone:
          type: string
        whatsappPhone:
          type: string
        billingEmail:
          type: string
          format: email

    UpdateCustomerRequest:
      type: object
      minProperties: 1
      properties:
        customerKind:
          $ref: '#/components/schemas/CustomerKind'
        name:
          type: string
          minLength: 1
        companyName:
          type: string
          nullable: true
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        displayName:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/CustomerStatus'
        type:
          $ref: '#/components/schemas/CustomerType'
        ownerUserId:
          type: string
          format: uuid
        taxId:
          type: string
          nullable: true
        website:
          type: string
          format: uri
          nullable: true
        industry:
          type: string
          nullable: true
        companySize:
          type: string
          nullable: true
        source:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        notesSummary:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        whatsappPhone:
          type: string
          nullable: true
        billingEmail:
          type: string
          format: email
          nullable: true

    ArchiveCustomerRequest:
      type: object
      properties:
        archiveReason:
          type: string

    RestoreCustomerRequest:
      type: object
      properties:

    ProjectStatus:
      type: string
      enum: [draft, active, completed]

    ProjectSort:
      type: string
      enum: [title, createdAt, updatedAt, status]

    Project:
      type: object
      required:
        - id
        - customerId
        - title
        - status
        - ownerUserId
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/ProjectStatus'
        ownerUserId:
          type: string
        archivedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateProjectRequest:
      type: object
      required: [customerId, title, ownerUserId]
      properties:
        customerId:
          type: string
          format: uuid
        title:
          type: string
          minLength: 1
        description:
          type: string
        status:
          $ref: '#/components/schemas/ProjectStatus'
        ownerUserId:
          type: string

    UpdateProjectRequest:
      type: object
      minProperties: 1
      properties:
        customerId:
          type: string
          format: uuid
        title:
          type: string
          minLength: 1
        description:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/ProjectStatus'
        ownerUserId:
          type: string

    ArchiveProjectRequest:
      type: object
      properties:

    CustomerContact:
      type: object
      required:
        - id
        - customerId
        - firstName
        - isPrimary
        - isBilling
        - preferredChannel
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
          nullable: true
        jobTitle:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        phone:
          type: string
          nullable: true
        whatsappPhone:
          type: string
          nullable: true
        isPrimary:
          type: boolean
        isBilling:
          type: boolean
        preferredChannel:
          $ref: '#/components/schemas/ContactChannel'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        archivedAt:
          type: string
          format: date-time
          nullable: true

    CreateCustomerContactRequest:
      type: object
      required: [firstName]
      properties:
        firstName:
          type: string
          minLength: 1
        lastName:
          type: string
        jobTitle:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        whatsappPhone:
          type: string
        isPrimary:
          type: boolean
          default: false
        isBilling:
          type: boolean
          default: false
        preferredChannel:
          $ref: '#/components/schemas/ContactChannel'

    UpdateCustomerContactRequest:
      type: object
      minProperties: 1
      properties:
        firstName:
          type: string
          minLength: 1
        lastName:
          type: string
          nullable: true
        jobTitle:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        phone:
          type: string
          nullable: true
        whatsappPhone:
          type: string
          nullable: true
        isPrimary:
          type: boolean
        isBilling:
          type: boolean
        preferredChannel:
          $ref: '#/components/schemas/ContactChannel'

    CustomerAddressType:
      type: string
      enum: [billing, shipping, office, other]

    CustomerAddress:
      type: object
      required:
        - id
        - customerId
        - type
        - line1
        - city
        - country
        - isPrimary
        - isBilling
        - createdAt
        - updatedAt
        - archivedAt
      properties:
        id:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/CustomerAddressType'
        line1:
          type: string
        line2:
          type: string
          nullable: true
        city:
          type: string
        region:
          type: string
          nullable: true
        postalCode:
          type: string
          nullable: true
        country:
          type: string
        isPrimary:
          type: boolean
        isBilling:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        archivedAt:
          type: string
          format: date-time
          nullable: true

    CreateCustomerAddressRequest:
      type: object
      required: [type, line1, city, country]
      properties:
        type:
          $ref: '#/components/schemas/CustomerAddressType'
        line1:
          type: string
        line2:
          type: string
        city:
          type: string
        region:
          type: string
        postalCode:
          type: string
        country:
          type: string
        isPrimary:
          type: boolean
          default: false
        isBilling:
          type: boolean
          default: false

    UpdateCustomerAddressRequest:
      type: object
      description: At least one updatable address field is required.
      minProperties: 2
      properties:
        type:
          $ref: '#/components/schemas/CustomerAddressType'
        line1:
          type: string
        line2:
          type: string
          nullable: true
        city:
          type: string
        region:
          type: string
          nullable: true
        postalCode:
          type: string
          nullable: true
        country:
          type: string
        isPrimary:
          type: boolean
        isBilling:
          type: boolean

    CustomerNote:
      type: object
      required: [id, customerId, authorUserId, body, createdAt, updatedAt, archivedAt]
      properties:
        id:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
        authorUserId:
          type: string
          format: uuid
        body:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        archivedAt:
          type: string
          format: date-time
          nullable: true

    CreateCustomerNoteRequest:
      type: object
      required: [body]
      properties:
        body:
          type: string
          minLength: 1

    UpdateCustomerNoteRequest:
      type: object
      required: [body]
      properties:
        body:
          type: string
          minLength: 1

    ActorRequest:
      type: object
      properties:

    PaginatedCustomersResponse:
      type: object
      required: [data, hasMore]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Customer'
        nextCursor:
          type: string
          nullable: true
        hasMore:
          type: boolean

    PaginatedProjectsResponse:
      type: object
      required: [data, hasMore]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Project'
        nextCursor:
          type: string
          nullable: true
        hasMore:
          type: boolean

    QuoteStatus:
      type: string
      enum: [draft, sent, accepted, rejected]

    QuoteLineItem:
      type: object
      required:
        - id
        - quoteId
        - quoteAreaId
        - sortOrder
        - stoneType
        - qty
        - qtyUnit
        - unitPriceCents
        - laborPriceCents
        - lineTotalCents
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        quoteId:
          type: string
          format: uuid
        quoteAreaId:
          type: string
          format: uuid
          nullable: true
        slabId:
          type: string
          format: uuid
          nullable: true
        sortOrder:
          type: integer
          default: 0
        stoneType:
          type: string
          example: Marble Calacatta
        lengthIn:
          type: number
          nullable: true
        widthIn:
          type: number
          nullable: true
        thicknessCm:
          type: number
          nullable: true
          example: 2
        edgeProfile:
          type: string
          nullable: true
          example: bullnose
        qty:
