      operationId: rejectCustomerQuote
      summary: Transition quote from sent to rejected
      parameters:
        - $ref: '#/components/parameters/CustomerId'
        - $ref: '#/components/parameters/QuoteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActorRequest'
      responses:
        '200':
          description: Quote transitioned to rejected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Quote'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Quote or customer not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Quote is not in sent status — transition not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /customers/{customerId}/quotes/{quoteId}/archive:
    post:
      operationId: archiveCustomerQuote
      summary: Archive (soft-delete) a quote
      parameters:
        - $ref: '#/components/parameters/CustomerId'
        - $ref: '#/components/parameters/QuoteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActorRequest'
      responses:
        '200':
          description: Quote archived.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Quote'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Quote or customer not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /customers/{customerId}/quotes/{quoteId}/line-items:
    get:
      operationId: listQuoteLineItems
      summary: List all line items for a quote
      parameters:
        - $ref: '#/components/parameters/CustomerId'
        - $ref: '#/components/parameters/QuoteId'
      responses:
        '200':
          description: Line items returned.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/QuoteLineItem'
        '404':
          description: Quote or customer not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      operationId: addQuoteLineItem
      summary: Add a line item to a quote (draft only)
      parameters:
        - $ref: '#/components/parameters/CustomerId'
        - $ref: '#/components/parameters/QuoteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateQuoteLineItemRequest'
      responses:
        '201':
          description: Line item added.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteLineItem'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Quote or customer not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Quote is not in draft status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /customers/{customerId}/quotes/{quoteId}/line-items/{lineItemId}:
    patch:
      operationId: updateQuoteLineItem
      summary: Update a quote line item (draft only)
      parameters:
        - $ref: '#/components/parameters/CustomerId'
        - $ref: '#/components/parameters/QuoteId'
        - $ref: '#/components/parameters/LineItemId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateQuoteLineItemRequest'
      responses:
        '200':
          description: Line item updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteLineItem'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Line item, quote, or customer not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Quote is not in draft status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      operationId: removeQuoteLineItem
      summary: Remove a quote line item (draft only)
      parameters:
        - $ref: '#/components/parameters/CustomerId'
        - $ref: '#/components/parameters/QuoteId'
        - $ref: '#/components/parameters/LineItemId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActorRequest'
      responses:
        '200':
          description: Line item removed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteLineItem'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Line item, quote, or customer not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Quote is not in draft status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
